name: Compile MuxTO

on:
  push:
    paths:
      - ".github/workflows/compile-muxto.yml"
      - "firmwares/MuxTO/**"
  pull_request:
    paths:
      - ".github/workflows/compile-muxto.yml"
      - "firmwares/MuxTO/**"
  schedule:
    - cron: "0 8 * * TUE"
  workflow_dispatch:
  repository_dispatch:

env:
  BINARY_FILENAME: MuxTO.ino.bin
  BINARY_ARTIFACT_NAME: MuxTO

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        board:
          - fqbn: arduino:samd:muxto:float=default,config=enabled,clock=internal_usb,timer=timer_732Hz,bootloader=4kb,serial=two_uart,usb=cdc

    steps:
      - name: Set environment variables
        run: |
          echo "BINARY_OUTPUT_PATH=${{ runner.temp }}/output" >> "$GITHUB_ENV"
          echo "SKETCHES_REPORTS_PATH=${{ runner.temp }}/sketches-reports" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v4

      # Download arduino-cli directly as a binary, no install script needed
      - name: Install arduino-cli
        run: |
          ARDUINO_CLI_VERSION="1.1.1"
          curl -fsSL "https://github.com/arduino/arduino-cli/releases/download/v${ARDUINO_CLI_VERSION}/arduino-cli_${ARDUINO_CLI_VERSION}_Linux_64bit.tar.gz" \
            -o arduino-cli.tar.gz
          tar -xzf arduino-cli.tar.gz arduino-cli
          sudo mv arduino-cli /usr/local/bin/arduino-cli
          sudo chmod +x /usr/local/bin/arduino-cli
          arduino-cli version

      - name: Configure arduino-cli with MattairTech index
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls \
            https://www.mattairtech.com/software/arduino/package_MattairTech_index.json

      - name: Update platform index
        run: arduino-cli core update-index

      - name: Install MattairTech_Arduino:samd toolchain
        run: arduino-cli core install MattairTech_Arduino:samd@1.6.17

      - name: Compile MuxTO firmware
        uses: arduino/compile-sketches@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fqbn: ${{ matrix.board.fqbn }}
          platforms: |
            - name: MattairTech_Arduino:samd
              source-url: https://www.mattairtech.com/software/arduino/package_MattairTech_index.json
              version: 1.6.17
            - name: arduino:samd
              source-url: https://github.com/arduino/ArduinoCore-samd.git
              version: muxto
          libraries: |
            -
          sketch-paths: |
            - firmwares/MuxTO
          cli-compile-flags: |
            - --output-dir=${{ env.BINARY_OUTPUT_PATH }}
          enable-deltas-report: true
          sketches-report-path: ${{ env.SKETCHES_REPORTS_PATH }}

      - name: Save firmware binary as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          path: ${{ env.BINARY_OUTPUT_PATH }}/${{ env.BINARY_FILENAME }}
          name: ${{ env.BINARY_ARTIFACT_NAME }}

      - name: Save sketches report as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          path: ${{ env.SKETCHES_REPORTS_PATH }}
          name: sketches-reports

  size:
    name: Check firmware size
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BINARY_ARTIFACT_NAME }}

      - name: Check firmware binary size
        run: |
          BINARY_SIZE="$(stat --printf="%s" "${{ github.workspace }}/${{ env.BINARY_FILENAME }}")"
          MAX_BINARY_SIZE=$((12 * 1024))
          echo "File size: ${BINARY_SIZE}/${MAX_BINARY_SIZE} B"
          if [[ $BINARY_SIZE -gt $MAX_BINARY_SIZE ]]; then
            echo "::error::Binary size of $BINARY_SIZE B exceeds the available memory ($MAX_BINARY_SIZE B)"
            exit 1
          fi
